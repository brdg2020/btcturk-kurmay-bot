name: Binance TR Otonom Kurmay Bot

on:
  workflow_dispatch:
  schedule:
    - cron: '5 0 * * *'

jobs:
  run-bot:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
    - name: Install dependencies
      run: pip install requests
    - name: Run script
      env:
        TRBINANCE_API_KEY: ${{ secrets.TRBINANCE_API_KEY }}
        TRBINANCE_API_SECRET: ${{ secrets.TRBINANCE_API_SECRET }}
      run: python bot.py
