name: Binance TR Otonom Kurmay Bot

on:
  workflow_dispatch:
  schedule:
    - cron: '5 0 * * *'

jobs:
  trade-run:
    runs-on: ubuntu-latest

    steps:
    - name: Kod Deposunu Klonla
      uses: actions/checkout@v4

    - name: Python 3.10 Kurulumu
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Gerekli Kütüphaneleri Yükle
      run: |
        python -m pip install --upgrade pip
        pip install ccxt requests

    - name: Botu Ateşle
      env:
        TRBINANCE_API_KEY: ${{ secrets.TRBINANCE_API_KEY }}
        TRBINANCE_API_SECRET: ${{ secrets.TRBINANCE_API_SECRET }}
      run: |
        python bot.py
